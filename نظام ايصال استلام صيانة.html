<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إصدار إيصال استلام صيانة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            padding: 0;
        }

        /* تنسيقات الطباعة الاحترافية */
        @media print {
            @page {
                size: 90mm 23mm landscape;
                margin: 0;
            }
            
            html, body {
                width: 90mm;
                height: 23mm;
                margin: 0 !important;
                padding: 0 !important;
                background-color: white !important;
                font-family: 'Noto Sans Arabic', sans-serif;
                overflow: hidden;
            }
            
            .no-print {
                display: none !important;
            }

            #printArea {
                width: 90mm !important;
                height: 23mm !important;
                display: flex !important;
                align-items: center !important;
                justify-content: flex-start !important;
            }

            .sticker-card {
                width: 88mm !important; 
                height: 23mm !important;
                padding: 0.5mm 1mm 0.5mm 0 !important; 
                box-sizing: border-box !important;
                display: flex !important;
                flex-direction: column !important;
                justify-content: center !important; 
                align-items: flex-start !important; 
                text-align: right !important;
                border: none !important;
            }

            .header-main {
                font-size: 8pt !important; 
                font-weight: bold !important;
                width: 100% !important;
                margin-bottom: 0px !important; 
                line-height: 1 !important;
                color: black !important;
            }

            .sticker-title {
                font-size: 7.5pt !important; 
                border-bottom: 0.8px solid #000 !important;
                margin-bottom: 1px !important;
                padding-bottom: 0.5px !important;
                width: 100% !important;
                font-weight: bold !important;
                line-height: 1 !important;
                color: black !important;
            }

            .data-row {
                font-size: 6.8pt !important; 
                line-height: 1.1 !important;
                margin-bottom: 0.3px !important;
                display: flex !important;
                width: 100% !important;
                color: black !important;
                white-space: pre-line !important; /* يحافظ على قفزات الأسطر اليدوية */
                word-break: break-word !important;
            }

            .device-row {
                align-items: flex-start !important;
                height: auto !important;
                max-height: 18pt !important; 
                overflow: hidden !important;
            }
        }

        /* تنسيق المعاينة للشاشة */
        .sticker-card {
            font-family: 'Noto Sans Arabic', sans-serif;
            width: 450px; 
            height: 115px; 
            background: white;
            border: 1px dashed #cbd5e1;
            padding: 8px 10px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            text-align: right;
            margin: 0 auto;
        }

        .header-main { font-weight: 700; font-size: 10pt; width: 100%; line-height: 1.2; color: #1e293b; }
        .sticker-title { font-weight: 700; font-size: 9pt; border-bottom: 2px solid #334155; margin-bottom: 6px; width: 100%; line-height: 1.2; color: #1e293b; }
        .data-row { font-size: 8.5pt; margin-bottom: 2px; width: 100%; color: #000; display: flex; white-space: pre-line; }
        .label-bold { font-weight: 700; flex-shrink: 0; margin-left: 4px; }
        
        input:focus, textarea:focus { border-color: #4f46e5 !important; box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.1); }
        
        .app-header {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- واجهة التحكم -->
    <div class="max-w-2xl mx-auto no-print bg-white rounded-3xl shadow-2xl overflow-hidden mb-8 border border-slate-100">
        <div class="app-header p-6 text-white flex flex-col md:flex-row justify-between items-center gap-4 border-b border-slate-700">
            <div class="flex items-center gap-4">
                <div class="bg-white p-2 rounded-xl shadow-lg w-16 h-16 flex items-center justify-center">
                    <!-- الشعار المصمم برمجياً بحرف i -->
                    <svg viewBox="0 0 100 100" class="w-12 h-12">
                        <circle cx="50" cy="50" r="45" fill="#4f46e5" />
                        <rect x="45" y="40" width="10" height="35" fill="white" rx="2" />
                        <circle cx="50" cy="30" r="6" fill="white" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold">نظام إصدار إيصال استلام صيانة</h1>
                    <p class="text-xs text-slate-400">مؤسسة الاهتمام للاتصالات - ملصق احترافي</p>
                </div>
            </div>
            <button onclick="window.print()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-2xl font-bold transition-all flex items-center gap-2 shadow-lg shadow-indigo-500/30 active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9V2h12v7"></path><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                طباعة الملصق
            </button>
        </div>
        
        <div class="p-8 grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="col-span-1">
                <label class="text-xs font-bold text-slate-500 mb-2 block">رقم الصيانة</label>
                <div class="relative">
                    <span class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 font-bold text-sm">RET-</span>
                    <input type="text" id="mId" placeholder="0000" oninput="sync()" class="w-full border border-slate-200 rounded-xl p-3 pr-12 text-sm outline-none font-bold">
                </div>
            </div>
            <div class="col-span-1">
                <label class="text-xs font-bold text-slate-500 mb-2 block">تاريخ الاستلام</label>
                <input type="date" id="mDate" oninput="sync()" class="w-full border border-slate-200 rounded-xl p-3 text-sm outline-none">
            </div>
            <div class="col-span-2">
                <label class="text-xs font-bold text-slate-500 mb-2 block">اسم العميل</label>
                <input type="text" id="mName" placeholder="أدخل اسم العميل كاملاً" oninput="sync()" class="w-full border border-slate-200 rounded-xl p-3 text-sm outline-none">
            </div>
            <div class="col-span-1">
                <label class="text-xs font-bold text-slate-500 mb-2 block">رقم الجوال</label>
                <input type="text" id="mPhone" placeholder="05xxxxxxxx" oninput="sync()" dir="ltr" class="w-full border border-slate-200 rounded-xl p-3 text-sm font-bold text-left outline-none">
            </div>
            <div class="col-span-1">
                <label class="text-xs font-bold text-slate-500 mb-2 block">نوع الجهاز / العطل (ادعم صفين بضغط Enter)</label>
                <textarea id="mDevice" placeholder="آيفون 13 [Enter] شاشة مكسورة" oninput="sync()" class="w-full border border-slate-200 rounded-xl p-3 text-sm outline-none h-[46px] resize-none"></textarea>
            </div>
        </div>
    </div>

    <!-- منطقة الملصق (المعاينة والطباعة) -->
    <div id="printArea">
        <div class="sticker-card">
            <div class="header-main">إيصال استلام صيانة</div>
            <div class="sticker-title">مؤسسة الاهتمام للاتصالات</div>
            
            <div class="data-row">
                <span class="label-bold">رقم:</span> <span id="vId">---</span>
            </div>
            
            <div class="data-row">
                <span class="label-bold">التاريخ:</span> <span id="vDate">---</span>
            </div>
            
            <div class="data-row">
                <span class="label-bold">العميل:</span> <span id="vName">---</span>
            </div>
            
            <div class="data-row">
                <span class="label-bold">الجوال:</span> <span id="vPhone" dir="ltr" class="label-bold">---</span>
            </div>
            
            <div class="data-row device-row">
                <span class="label-bold">الجهاز:</span> <span id="vDevice">---</span>
            </div>
        </div>
    </div>

    <script>
        window.onload = function() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('mDate').value = today;
            sync();
        };

        function sync() {
            const rawId = document.getElementById('mId').value;
            document.getElementById('vId').innerText = rawId ? 'RET-' + rawId : '---';
            
            const dateVal = document.getElementById('mDate').value;
            document.getElementById('vDate').innerText = dateVal ? dateVal.replace(/-/g, '/') : '---';
            
            document.getElementById('vName').innerText = document.getElementById('mName').value || '---';
            document.getElementById('vPhone').innerText = document.getElementById('mPhone').value || '---';
            document.getElementById('vDevice').innerText = document.getElementById('mDevice').value || '---';
        }
    </script>
</body>
</html>
